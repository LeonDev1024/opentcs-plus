# OpenTCS Plus Flyway 配置（本地 / CI 共用）
# 密码通过环境变量注入，勿在此文件写入生产凭据

flyway.url=jdbc:mysql://${FLYWAY_HOST:-127.0.0.1}:${FLYWAY_PORT:-3306}/${FLYWAY_DATABASE:-opentcsplus}?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
flyway.user=${FLYWAY_USER:-root}
flyway.password=${FLYWAY_PASSWORD:-}
flyway.locations=filesystem:db/migration,filesystem:db/repeatable
flyway.table=flyway_schema_history
flyway.encoding=UTF-8
flyway.validateOnMigrate=true
flyway.outOfOrder=false
flyway.cleanDisabled=true
flyway.baselineOnMigrate=false
