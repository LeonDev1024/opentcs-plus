## EMQX 5.x 配置文件
## 文档: https://www.emqx.io/docs/zh/v5.0/configuration/configuration.html

node {
  name = "emqx@opentcs-emqx"
  cookie = "opentcs-emqx-secret-cookie"
  data_dir = "/opt/emqx/data"
}

log {
  file_handlers.default {
    level = warning
    file = "/opt/emqx/log/emqx.log"
  }
}

dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  ## 密码通过环境变量 EMQX_DASHBOARD__DEFAULT_PASSWORD 覆盖
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 1024000
}

mqtt {
  max_packet_size = 1MB
  max_qos_allowed = 2
  retain_available = true
  wildcard_subscription = true
  shared_subscription = true
  session_expiry_interval = 2h
}

## 认证: 使用内置数据库
authentication = [
  {
    mechanism = password_based
    backend = built_in_database
    user_id_type = username
    password_hash_algorithm {
      name = bcrypt
    }
  }
]

## ACL 规则
authorization {
  no_match = allow
  deny_action = ignore
  sources = [
    { type = file, path = "/opt/emqx/etc/acl.conf" }
  ]
}
