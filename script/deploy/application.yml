# 生产环境配置文件
# 复制此文件为 application.yml 并根据实际情况修改

spring:
  datasource:
    dynamic:
      datasource:
        master:
          # 使用容器名称 mysql 访问 MySQL
          url: jdbc:mysql://mysql:3306/opentcs?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
          username: opentcs
          password: Opentcs@2024!DB
          driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      # 使用容器名称 redis 访问 Redis
      host: redis
      port: 6379
      password: Redis@2024!Cache
      database: 0

server:
  port: 8088

# 禁用 XXL-Job (如需启用请配置相应参数)
xxl:
  job:
    enabled: false

# 禁用 MQTT (如需启用请配置相应参数)
mqtt:
  enabled: false

# 文件上传配置
file:
  domain: http://localhost:9000
  path: /usr/share/nginx/html
  prefix: /statics
