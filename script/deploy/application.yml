# 生产环境部署配置 (优先级高于 jar 包内的 application-prod.yml)
# 敏感值通过环境变量注入，此处为默认兜底值
spring:
  datasource:
    dynamic:
      datasource:
        master:
          url: jdbc:mysql://mysql:3306/opentcsplus?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
          username: ${SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME:opentcs}
          password: ${SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD:Opentcs@2024!DB}
          driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:Redis@2024!Cache}
      database: 0

server:
  port: 8088

# 安全配置 (必须保留，否则登录接口会被拦截)
security:
  excludes:
    - /*.html
    - /**/*.html
    - /**/*.css
    - /**/*.js
    - /favicon.ico
    - /error
    - /*/api-docs
    - /*/api-docs/**
    - /auth/**
    - /resource/**

# MQTT 配置 (通过 EMQX 中间件)
mqtt:
  enabled: ${MQTT_ENABLED:true}
  broker-url: ${MQTT_BROKER_URL:tcp://emqx:1883}
  username: ${MQTT_USERNAME:opentcs}
  password: ${MQTT_PASSWORD:Opentcs@2024!MQTT}
  client-id: ${MQTT_CLIENT_ID:opentcs-server}
  qos: 1
  keep-alive: 60
  topics:
    vehicle-status: opentcs/vehicle/+/status
    vehicle-command: opentcs/vehicle/+/command
    order-event: opentcs/order/event

# 定时任务 (按需启用)
xxl:
  job:
    enabled: false

# 文件上传
file:
  domain: http://localhost:8088
  path: /app/upload
  prefix: /upload
