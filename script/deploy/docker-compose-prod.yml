version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: opentcs-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-MySQL@2024!Root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-opentcs}
      MYSQL_USER: ${MYSQL_USER:-opentcs}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Opentcs@2024!DB}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - opentcs-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: opentcs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-Redis@2024!Cache}
    volumes:
      - redis-data:/data
    networks:
      - opentcs-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Redis@2024!Cache}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储
  minio:
    image: minio/minio
    container_name: opentcs-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-MinIO@2024!Admin}
    volumes:
      - minio-data:/data
    networks:
      - opentcs-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # 后端服务
  backend:
    image: opentcs-admin:latest
    container_name: opentcs-admin
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ./application.yml:/app/application.yml
      - backend-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opentcs-network
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai

# 网络配置
networks:
  opentcs-network:
    driver: bridge

# 数据卷配置
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  backend-logs:
    driver: local
