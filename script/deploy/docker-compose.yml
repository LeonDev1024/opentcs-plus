version: '3.8'

# 目标平台: linux/amd64 (Ubuntu 20.04 x86)
# 用法: ./scripts/install.sh  或  docker compose up -d

x-platform: &platform
  platform: linux/amd64

services:
  # ==================== 基础中间件 ====================

  mysql:
    <<: *platform
    image: mysql:8.0
    container_name: opentcs-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-MySQL@2024!Root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-opentcsplus}
      MYSQL_USER: ${MYSQL_USER:-opentcs}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Opentcs@2024!DB}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./config/mysql/init.d:/docker-entrypoint-initdb.d:ro
    networks:
      - opentcs-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-MySQL@2024!Root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --innodb_buffer_pool_size=256M

  flyway:
    <<: *platform
    image: flyway/flyway:10-alpine
    container_name: opentcs-flyway
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../../db/migration:/flyway/sql/migration:ro
      - ../../db/repeatable:/flyway/sql/repeatable:ro
    command: >
      -url=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-opentcsplus}?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      -user=root
      -password=${MYSQL_ROOT_PASSWORD:-MySQL@2024!Root}
      -locations=filesystem:/flyway/sql/migration,filesystem:/flyway/sql/repeatable
      -connectRetries=60
      migrate
    networks:
      - opentcs-net
    restart: "no"

  redis:
    <<: *platform
    image: redis:7.2
    container_name: opentcs-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-Redis@2024!Cache}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - opentcs-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Redis@2024!Cache}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  emqx:
    <<: *platform
    image: emqx/emqx:5.7
    container_name: opentcs-emqx
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"           # MQTT TCP
      - "${MQTT_WS_PORT:-8083}:8083"        # MQTT WebSocket
      - "${EMQX_DASHBOARD_PORT:-18083}:18083" # EMQX Dashboard
    environment:
      EMQX_NODE__NAME: emqx@opentcs-emqx
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-Emqx@2024!Admin}
      EMQX_MQTT__ALLOW_ANONYMOUS: "false"
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
      - ./config/emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
    networks:
      - opentcs-net
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ==================== 应用服务 ====================

  backend:
    <<: *platform
    image: opentcs-admin:${APP_VERSION:-latest}
    container_name: opentcs-admin
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8088}:8088"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
      # 数据库
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-opentcsplus}?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME: ${MYSQL_USER:-opentcs}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD: ${MYSQL_PASSWORD:-Opentcs@2024!DB}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-Redis@2024!Cache}
      SPRING_DATA_REDIS_DATABASE: 0
      # MQTT / EMQX
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_BROKER_URL: tcp://emqx:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-opentcs}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-Opentcs@2024!MQTT}
      MQTT_CLIENT_ID: opentcs-server-${HOSTNAME}
    depends_on:
      mysql:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - opentcs-net
    volumes:
      - backend-logs:/app/logs
      - backend-upload:/app/upload

  frontend:
    <<: *platform
    image: opentcs-web:${APP_VERSION:-latest}
    container_name: opentcs-web
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - opentcs-net

# ==================== 网络 & 数据卷 ====================

networks:
  opentcs-net:
    driver: bridge
    name: opentcs-net

volumes:
  mysql-data:
  redis-data:
  emqx-data:
  emqx-log:
  backend-logs:
  backend-upload:
