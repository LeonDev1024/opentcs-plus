version: '3.8'

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    hostname: minio
    restart: unless-stopped
    ports:
      - "9000:9000"  # API端口 (S3协议)
      - "9001:9001"  # 控制台端口 (Web界面)
    environment:
      MINIO_ROOT_USER: admin           # 管理用户名
      MINIO_ROOT_PASSWORD: password123 # 管理密码（请修改！）
      # MINIO_SERVER_URL: http://your-domain.com:9000  # 有域名时启用
      # MINIO_BROWSER_REDIRECT_URL: http://your-domain.com:9001
    volumes:
      - ~/minio/data:/data           # 数据存储目录
      # - ~/minio/config:/root/.minio # 配置文件目录（可选）
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"