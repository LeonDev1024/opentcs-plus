name: Build and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '21'

jobs:
  #=================== 测试 ===================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test -Pdev -B

  #=================== 构建镜像 ===================
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package -DskipTests -Pprod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_HOST }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: opentcs-plus/script/deploy/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_HOST }}/opentcs-backend:latest
            ${{ secrets.ACR_HOST }}/opentcs-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  #=================== 部署到服务器 ===================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -e
            # 登录阿里云 ACR
            docker login --username=${{ secrets.ACR_USERNAME }} --password=${{ secrets.ACR_PASSWORD }} ${{ secrets.ACR_HOST }}
            # 拉取最新镜像
            docker pull ${{ secrets.ACR_HOST }}/opentcs-backend:latest
            # 打标签
            docker tag ${{ secrets.ACR_HOST }}/opentcs-backend:latest opentcs-admin:latest
            cd /opt/opentcs-deploy
            docker compose -f docker-compose.prod.yml up -d --force-recreate backend
            sleep 30
            curl -sf http://localhost:8088/actuator/health || echo 'Backend may not be ready'
            echo 'Deployment completed!'
          "
