name: Build and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '21'

jobs:
  #=================== 测试 ===================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test -Pdev -B

  #=================== 构建并部署 ===================
  build-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package -DskipTests -Pprod

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Upload to Server
        run: |
          # 创建部署目录
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p /tmp/opentcs-deploy"

          # 上传 JAR
          scp -o StrictHostKeyChecking=no opentcs-admin/target/opentcs-admin.jar ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/opentcs-deploy/app.jar

          # 上传 Dockerfile
          scp -o StrictHostKeyChecking=no opentcs-plus/script/deploy/backend/Dockerfile ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/opentcs-deploy/Dockerfile

      - name: Build and Deploy on Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -e
            cd /tmp/opentcs-deploy

            # 构建 Docker 镜像
            docker build -t opentcs-admin:local .

            # 重启服务
            cd /opt/opentcs-deploy
            docker rm -f opentcs-admin 2>/dev/null || true
            docker run -d --name opentcs-admin --network opentcs-network -p 8088:8088 \\
              -e SPRING_PROFILES_ACTIVE=prod \\
              -e TZ=Asia/Shanghai \\
              -e SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_URL='jdbc:mysql://opentcs-mysql:3306/opentcs?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true' \\
              -e SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME=opentcs \\
              -e SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD='Opentcs@2024!DB' \\
              -e SPRING_DATA_REDIS_HOST=opentcs-redis \\
              -e SPRING_DATA_REDIS_PORT=6379 \\
              -e SPRING_DATA_REDIS_PASSWORD='Redis@2024!Cache' \\
              opentcs-admin:local

            sleep 20
            curl -sf http://localhost:8088/actuator/health && echo 'Deployment SUCCESS!' || echo 'Deployment FAILED!'
          "
