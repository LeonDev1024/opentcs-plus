name: Build and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '21'

jobs:
  #=================== 测试 ===================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test -Pdev -B

  #=================== 构建并部署 ===================
  build-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package -DskipTests -Pprod

      - name: Deploy to Server
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Upload and Deploy
        run: |
          # 上传 JAR 文件
          scp -o StrictHostKeyChecking=no opentcs-admin/target/opentcs-admin.jar ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/opentcs-admin.jar

          # 在服务器上构建镜像并部署
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -e
            cd /tmp

            # 构建 Docker 镜像
            docker build -t opentcs-admin:latest -f - . << EOF
            FROM eclipse-temurin:21-jre-alpine
            RUN apk add --no-cache tzdata
            ENV TZ=Asia/Shanghai
            RUN mkdir -p /app /app/logs /app/temp /app/upload
            WORKDIR /app
            COPY opentcs-admin.jar ./app.jar
            RUN chown -R 1000:1000 /app
            USER 1000
            EXPOSE 8088
            HEALTHCHECK --interval=30s --timeout=10s --start-period=60s --retries=3 CMD wget --no-verbose --tries=1 --spider http://localhost:8088/actuator/health || exit 1
            ENTRYPOINT [\"java\", \"-jar\", \"-Xms512m\", \"-Xmx1024m\", \"/app/app.jar\", \"--spring.profiles.active=prod\"]
            EOF

            cd /opt/opentcs-deploy
            docker compose up -d --force-recreate backend
            sleep 30
            curl -sf http://localhost:8088/actuator/health || echo 'Backend may not be ready'
            echo 'Deployment completed!'
          "
