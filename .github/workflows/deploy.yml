name: Build and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '21'

jobs:
  #=================== 测试 ===================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        run: mvn test -Pdev -B

  #=================== 构建 JAR ===================
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package -DskipTests -Pprod

      - name: Upload JAR to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: opentcs-admin/target/opentcs-admin.jar
          target: /tmp/opentcs/
          strip_components: 3

  #=================== 部署到服务器 ===================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            cd /tmp/opentcs

            # 构建 Docker 镜像
            cat > Dockerfile << 'EOF'
            FROM eclipse-temurin:21-jre-alpine
            RUN apk add --no-cache tzdata
            ENV TZ=Asia/Shanghai
            RUN mkdir -p /app /app/logs /app/temp /app/upload
            WORKDIR /app
            COPY opentcs-admin.jar ./app.jar
            RUN chown -R 1000:1000 /app
            USER 1000
            EXPOSE 8088
            HEALTHCHECK --interval=30s --timeout=10s --start-period=60s --retries=3 CMD wget --no-verbose --tries=1 --spider http://localhost:8088/actuator/health || exit 1
            ENTRYPOINT ["java", "-jar", "-Xms512m", "-Xmx1024m", "/app/app.jar", "--spring.profiles.active=prod"]
            EOF

            docker build -t opentcs-admin:latest .
            cd /opt/opentcs-deploy
            docker compose up -d --force-recreate backend
            sleep 30
            curl -sf http://localhost:8088/actuator/health || echo 'Backend may not be ready'
            echo 'Deployment completed!'
